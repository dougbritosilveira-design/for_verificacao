services:
  - type: web
    name: verificacao-balanca
    env: python
    autoDeploy: true
    buildCommand: bash build.sh
    startCommand: python manage.py migrate && gunicorn verificacao_web.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: verificacao-balanca.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://verificacao-balanca.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: verificacao-balanca-db
          property: connectionString

databases:
  - name: verificacao-balanca-db
    databaseName: verificacao_balanca
    user: verificacao_balanca
