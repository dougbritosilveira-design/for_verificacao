{% extends 'base.html' %}
{% block title %}Alterar senha{% endblock %}
{% block content %}
<h2>Alterar senha</h2>
<p>Informe sua senha atual e a nova senha.</p>
<form method="post" style="max-width:520px;">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Salvar nova senha</button>
</form>
{% endblock %}
